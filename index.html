<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>フェイクケーキ デザイン診断</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg1:#fff7fa;
    --bg2:#fdeaf0;
    --accent:#e4758f;
    --accent-dark:#c55a75;
    --text:#4a3942;
    --muted:#8a7480;
    --card:#ffffff;
    --shadow:0 10px 30px rgba(196,90,117,.12);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family: "Hiragino Sans","Hiragino Kaku Gothic ProN","ヒラギノ角ゴ ProN W3","Yu Gothic","游ゴシック",sans-serif;
    font-weight:300;
    color:var(--text);
    background:
      radial-gradient(1200px 600px at 80% -10%, #ffe1ec 0%, transparent 60%),
      radial-gradient(800px 500px at -10% 100%, #fff2d9 0%, transparent 60%),
      linear-gradient(180deg, var(--bg1), var(--bg2));
    min-height:100vh;
    display:flex;
    align-items:flex-start;
    justify-content:center;
    padding:32px 16px 80px;
  }
  .app{
    width:100%;
    max-width:720px;
    background:var(--card);
    border-radius:28px;
    box-shadow:var(--shadow);
    padding:40px 32px;
    position:relative;
    overflow:hidden;
  }
  .app::before{
    content:"";
    position:absolute;inset:0;
    background:
      radial-gradient(300px 200px at 100% 0%, #ffe8f0 0%, transparent 70%),
      radial-gradient(300px 200px at 0% 100%, #fff4e2 0%, transparent 70%);
    pointer-events:none;
  }
  .brand{
    display:flex;align-items:center;gap:10px;
    font-size:13px;letter-spacing:.2em;color:var(--muted);
    margin-bottom:8px;
  }
  .brand-dot{width:8px;height:8px;border-radius:50%;background:var(--accent)}
  h1{
    font-size:28px;line-height:1.4;margin:4px 0 12px;font-weight:600;
  }
  .lede{font-size:14px;color:var(--muted);line-height:1.8;margin:0 0 28px}
  .btn{
    display:inline-flex;align-items:center;justify-content:center;gap:8px;
    padding:14px 28px;border-radius:999px;border:none;cursor:pointer;
    font-family:inherit;font-size:15px;font-weight:600;letter-spacing:.05em;
    background:var(--accent);color:#fff;
    box-shadow:0 8px 20px rgba(228,117,143,.35);
    transition:transform .15s ease, box-shadow .15s ease, background .15s ease;
  }
  .btn:hover{background:var(--accent-dark);transform:translateY(-1px)}
  .btn.secondary{
    background:transparent;color:var(--accent-dark);
    border:1px solid rgba(196,90,117,.3);box-shadow:none;
  }
  .btn.secondary:hover{background:#fff3f7}


  .hero{
    margin:8px 0 24px;
    text-align:center;
  }
  .hero img{
    display:block;
    width:100%;
    max-width:460px;
    margin:0 auto;
    border-radius:18px;
    box-shadow:0 12px 30px rgba(196,90,117,.15);
  }

  /* ===== Progress ===== */
  .progress{
    display:flex;align-items:center;gap:8px;margin-bottom:24px;
  }
  .progress-bar{
    flex:1;height:6px;border-radius:999px;background:#fce3ea;overflow:hidden;
  }
  .progress-fill{
    height:100%;background:linear-gradient(90deg,#f5a4b8,var(--accent));
    width:0%;transition:width .4s ease;
  }
  .progress-text{font-size:12px;color:var(--muted);min-width:40px;text-align:right}

  /* ===== Questions ===== */
  .question h2{
    font-size:22px;line-height:1.5;margin:6px 0 22px;font-weight:600;
  }
  .options{
    display:grid;grid-template-columns:1fr 1fr;gap:12px;
  }
  @media (max-width:520px){
    .options{grid-template-columns:1fr}
    .app{padding:28px 20px}
    h1{font-size:22px}
  }
  .option{
    background:#fff;
    border:1.5px solid #f2d7df;
    border-radius:18px;
    padding:18px 16px;
    text-align:left;
    cursor:pointer;
    font-family:inherit;font-size:15px;color:var(--text);
    transition:border-color .15s ease, transform .15s ease, background .15s ease;
    display:flex;align-items:center;gap:12px;
  }
  .option:hover{border-color:var(--accent);background:#fff7fa;transform:translateY(-1px)}
  .option .emoji{font-size:22px}
  .option .label{font-weight:600;font-size:15px;line-height:1.4}
  .option .desc{font-size:12px;color:var(--muted);margin-top:2px}

  .nav{
    display:flex;justify-content:space-between;margin-top:22px;
  }
  .nav .btn.secondary{padding:10px 18px;font-size:13px}

  /* ===== Result ===== */
  .result-header{ text-align:center; margin-bottom:18px; }
  .result-sub{ font-size:12px; letter-spacing:.3em; color:var(--accent-dark); margin-bottom:6px; }
  .result-title{ font-size:22px; font-weight:300; letter-spacing:.05em; margin:0 0 10px; }
  .result-lede{ font-size:13px; color:var(--muted); line-height:1.8; margin:0 0 18px; }

  .rec-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:16px;
    margin-bottom:8px;
  }
  @media (max-width:520px){
    .rec-grid{ grid-template-columns:1fr; }
  }
  .rec-card{
    background:linear-gradient(180deg,#fff,#fff7fa);
    border:1px solid #f2d7df;
    border-radius:20px;
    padding:14px;
    display:flex; flex-direction:column; gap:10px;
    text-align:left;
  }
  .rec-card img{
    width:100%; aspect-ratio:1/1; object-fit:cover;
    border-radius:14px; display:block;
    box-shadow:inset 0 0 0 1px #f7e2ea;
  }
  .rec-card .name{ font-size:14px; font-weight:600; line-height:1.5; }
  .rec-card .tag{ font-size:12px; color:var(--muted); line-height:1.6; }
  .rec-card .price{ font-size:13px; color:var(--accent-dark); font-weight:600; }
  .rec-card .btn{ padding:10px 18px; font-size:13px; margin-top:auto; }

  .result-actions{ display:flex; gap:12px; justify-content:center; margin-top:24px; flex-wrap:wrap; }

  

  .hidden{display:none}

  .footer{
    text-align:center;font-size:11px;color:var(--muted);margin-top:28px;letter-spacing:.1em;
  }
</style>
</head>

const state = { step:0, answers:{} };
const $ = (id)=>document.getElementById(id);

function show(id){
  ["screen-start","screen-question","screen-result"].forEach(s=>{
    $(s).classList.toggle("hidden", s !== id);
  });
}

function renderQuestion(){
  const q = QUESTIONS[state.step];
  $("q-title").textContent = q.title;
  $("progress-text").textContent = `${state.step+1}/${QUESTIONS.length}`;
  $("progress-fill").style.width = `${(state.step/QUESTIONS.length)*100}%`;

  const wrap = $("q-options");
  wrap.innerHTML = "";
  q.options.forEach(opt=>{
    const btn = document.createElement("button");
    btn.className = "option";
    btn.innerHTML = `
      <span class="emoji">${opt.emoji}</span>
      <span>
        <div class="label">${opt.label}</div>
      </span>`;
    btn.addEventListener("click", ()=>{
      state.answers[q.key] = opt.value;
      if(state.step < QUESTIONS.length-1){
        state.step++;
        renderQuestion();
      }else{
        $("progress-fill").style.width = "100%";
        setTimeout(showResult, 200);
      }
    });
    wrap.appendChild(btn);
  });

  $("btn-back").style.visibility = state.step === 0 ? "hidden" : "visible";
}

$("btn-start").addEventListener("click", ()=>{
  state.step = 0; state.answers = {};
  show("screen-question"); renderQuestion();
});
$("btn-back").addEventListener("click", ()=>{
  if(state.step > 0){ state.step--; renderQuestion(); }
});
$("btn-retry").addEventListener("click", ()=>{
  state.step = 0; state.answers = {};
  show("screen-start");
});

function scoreProduct(p, a){
  let s = 0;
  if(p.taste   === a.taste)   s += 4;
  if(p.purpose === a.purpose) s += 4;
  if(p.color   === a.color)   s += 2;
  if(p.motif   === a.motif)   s += 2;
  const colorAffinity = { pink:["pastel"], pastel:["pink","white"], white:["pastel"], berry:["pink"] };
  if(p.color !== a.color && (colorAffinity[a.color]||[]).includes(p.color)) s += 1;
  return s;
}

function showResult(){
  const a = state.answers;

  // === 段数フィルタ ===
  // Q1(taste): 推しへのプレゼント(chic) / 友達・家族へのプレゼント(natural) → 1段のみ
  let q1Allowed = new Set([1,2,3]);
  if (a.taste === "chic" || a.taste === "natural") q1Allowed = new Set([1]);

  // Q2(color): 祭壇で目立つ(pastel)→2・3段, 持ち運びしやすい(white)→1段, どちらも(pink)→1・2段
  let q2Allowed = new Set([1,2,3]);
  if (a.color === "pastel")      q2Allowed = new Set([2,3]);
  else if (a.color === "white")  q2Allowed = new Set([1]);
  else if (a.color === "pink")   q2Allowed = new Set([1,2]);

  // 両者の積集合。空なら「1段と2段」にフォールバック（推しへ/家族へ × 祭壇で目立つ のケース）
  let allowed = new Set([...q1Allowed].filter(t => q2Allowed.has(t)));
  if (allowed.size === 0) allowed = new Set([1, 2]);

  const pool = PRODUCTS.filter(p => allowed.has(p.tier));

  let top2;
  // 最優先: Q2=祭壇で目立つ(pastel) × Q3=派手(display) → 3種3段(p14) + チェリー3段(p10) を推薦
  if (a.color === "pastel" && a.purpose === "display") {
    const p14 = PRODUCTS.find(x => x.id === "p14");
    const p10 = PRODUCTS.find(x => x.id === "p10");
    top2 = [p14, p10].filter(Boolean);
  }
  // Q3=シンプル(photo) 特別ルール：大人リボン(p07)を必ず含める。2段がOKなら 大人リボン + 重ねる土台(p13) の組み合わせを推薦
  else if (a.purpose === "photo") {
    const otona = PRODUCTS.find(x => x.id === "p07");
    const dodai = PRODUCTS.find(x => x.id === "p13");
    if (allowed.has(2) && otona && dodai) {
      top2 = [otona, dodai];
    } else {
      top2 = [];
      if (otona) top2.push(otona);
      const ranked = pool
        .filter(p => p.id !== "p07")
        .map(p => ({p, s: scoreProduct(p, a)}))
        .sort((x, y) => y.s - x.s);
      if (ranked[0]) top2.push(ranked[0].p);
    }
  } else if (a.purpose === "display" && allowed.has(1)) {
    // Q3=派手(display) × 1段OK → ラブレター(p04) + あみあげマカロン(p06) を推薦
    const p04 = PRODUCTS.find(x => x.id === "p04");
    const p06 = PRODUCTS.find(x => x.id === "p06");
    top2 = [p04, p06].filter(Boolean);
  } else {
    const ranked = pool.map(p=>({p, s: scoreProduct(p,a)})).sort((x,y)=> y.s - x.s);
    top2 = ranked.slice(0,2).map(r=>r.p);
  }

  const grid = $("rec-grid"); grid.innerHTML = "";
  top2.forEach(p=>{
    const card = document.createElement("div");
    card.className = "rec-card";
    card.innerHTML = `
      <img src="${p.img}" alt="${p.name}" />
      <div class="name">${p.name}</div>
      <div class="tag">${p.tag}</div>
      <a class="btn" href="${p.url}" target="_blank" rel="noopener">商品ページを見る →</a>
    `;
    grid.appendChild(card);
  });

  show("screen-result");
}

function labelFor(key,val){
  const q = QUESTIONS.find(q=>q.key===key);
  const o = q.options.find(o=>o.value===val);
  return o ? o.label : val;
}
